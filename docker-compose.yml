
services:

  postgresql:
    image: postgres:17
    ports:
      - "5433:5432"

    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: event_hive
      POSTGRES_USER: postgres
    container_name: plsql_server

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5

    volumes:
      - eventHive_data:/var/lib/postgresql/data

  eventhive_app:
    image: anuragsen007/eventhive
    ports:
      - "8081:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/event_hive
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root

    container_name: eventhive_app

    depends_on:
      postgresql:
        condition: service_healthy


volumes:
  eventHive_data: